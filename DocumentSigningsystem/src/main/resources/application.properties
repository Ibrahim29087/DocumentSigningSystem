# Application
spring.application.name=DocumentSigningsystem

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/document_signing_db
spring.datasource.username=root
spring.datasource.password=#sql@database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT
app.jwt.secret=3f8b2c1d9e4a7f6b0c5d2e8a1f4b7c0d3e6a9f2b5c8d1e4a7f0b3c6d9e2a5f8
app.jwt.expiration=86400000

file.upload.dir=D:/uploads/documents