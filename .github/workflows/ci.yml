name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
     mysql:
      image: mysql:8
      env:
        MYSQL_ROOT_PASSWORD: rootpassword
        MYSQL_DATABASE: document_signing_db
        MYSQL_ROOT_HOST: '%'
      ports:
        - 3306:3306
      options: >-
        --health-cmd="mysqladmin ping"
        --health-interval=10s
        --health-timeout=5s
        --health-retries=5
    defaults:
       run:
        working-directory: DocumentSigningsystem
    env:
      DB_URL: jdbc:mysql://localhost:3306/document_signing_db
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      JWT_SECRET: test-secret-key-for-ci-pipeline-only-not-for-production-use
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and test
        run: mvn clean verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: React/document-signing-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build